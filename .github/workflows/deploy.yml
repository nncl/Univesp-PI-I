name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: sa-east-1
  ECR_BACKEND: yara-tattoo-backend
  ECR_FRONTEND: yara-tattoo-frontend
  ECS_CLUSTER: yara-tattoo-cluster
  ECS_BACKEND_SERVICE: yara-tattoo-backend
  ECS_FRONTEND_SERVICE: yara-tattoo-frontend

# Required for GitHub OIDC to mint a token AWS will trust.
permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Django tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpwd
          MYSQL_DATABASE: tattoo_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpwd"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install MySQL client headers
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config build-essential

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -prootpwd --silent; then
              echo "MySQL ready"; exit 0
            fi
            sleep 2
          done
          echo "MySQL never came up"; exit 1

      - name: Django check + tests
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: ci-test-key
          DJANGO_DEBUG: "false"
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: "3306"
          DATABASE_NAME: tattoo_test
          DATABASE_USER: root
          DATABASE_PASSWORD: rootpwd
        run: |
          python manage.py check
          python manage.py test --noinput

  deploy-backend:
    name: Build & deploy backend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="${REGISTRY}/${ECR_BACKEND}"
          docker build \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            ./backend
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Force new ECS deployment (backend)
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_BACKEND_SERVICE}" \
            --force-new-deployment \
            --query 'service.deployments[0].id' \
            --output text

  deploy-frontend:
    name: Build & deploy frontend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: |
          IMAGE="${REGISTRY}/${ECR_FRONTEND}"
          docker build \
            --target prod \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL}" \
            --build-arg NEXT_PUBLIC_GA_MEASUREMENT_ID="${NEXT_PUBLIC_GA_MEASUREMENT_ID}" \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            ./frontend
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ github.sha }}"

      - name: Force new ECS deployment (frontend)
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_FRONTEND_SERVICE}" \
            --force-new-deployment \
            --query 'service.deployments[0].id' \
            --output text
